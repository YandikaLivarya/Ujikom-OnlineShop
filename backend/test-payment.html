<!DOCTYPE html>
<html>
<head>
  <title>Xendit API Test</title>
  <style>
    body { font-family: Arial; margin: 20px; background: #f0f0f0; }
    .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
    .log { border: 1px solid #ccc; padding: 10px; margin: 10px 0; background: #f9f9f9; font-family: monospace; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background: #45a049; }
    .error { color: red; }
    .success { color: green; }
    .info { color: blue; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧪 Xendit Payment API Tester</h1>
    
    <h2>Backend Status Check</h2>
    <button onclick="checkBackend()">Check Backend (localhost:5000)</button>
    
    <h2>Create Invoice Test</h2>
    <button onclick="testCreateInvoice()">Test Create Invoice</button>
    
    <h2>API Response Log</h2>
    <div id="log" class="log">Waiting for test...</div>
  </div>

  <script>
    const logDiv = document.getElementById('log');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'blue';
      const line = `[${timestamp}] ${message}`;
      
      const span = document.createElement('div');
      span.style.color = color;
      span.textContent = line;
      logDiv.appendChild(span);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function checkBackend() {
      log('🔍 Checking backend...');
      try {
        const response = await fetch('http://localhost:5000/');
        log(`Backend status: ${response.status} ${response.statusText}`, 'success');
        const text = await response.text();
        log(`Response: ${text}`, 'success');
      } catch (error) {
        log(`❌ Backend not reachable: ${error.message}`, 'error');
      }
    }

    async function testCreateInvoice() {
      log('🚀 Testing Create Invoice...');
      
      const payload = {
        amount: 50000,
        description: 'Test Invoice',
        customer_name: 'Test Customer',
        customer_email: 'test@example.com',
        customer_phone: '081234567890',
        tracking_number: '999999',
        payment_method: 'E-Wallet'
      };

      log('📤 Payload: ' + JSON.stringify(payload, null, 2));

      try {
        const response = await fetch('http://localhost:5000/api/payment/create-invoice', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(payload),
        });

        log(`Response status: ${response.status} ${response.statusText}`);

        const data = await response.json();
        
        if (response.ok) {
          log('✅ Success! Invoice created:', 'success');
          log('Response: ' + JSON.stringify(data, null, 2), 'success');
          
          if (data.data && data.data.invoiceUrl) {
            log(`Invoice URL: ${data.data.invoiceUrl}`, 'success');
            log('You can open this URL in a new tab to test payment', 'info');
          }
        } else {
          log('❌ Error response:', 'error');
          log('Response: ' + JSON.stringify(data, null, 2), 'error');
        }
      } catch (error) {
        log(`❌ Fetch Error: ${error.message}`, 'error');
        log(`Make sure backend is running: node server.js`, 'error');
      }
    }

    log('🎯 Page loaded. Choose a test above.', 'info');
  </script>
</body>
</html>
